[module]
id           = "office"
display_name = "Office"
version      = "0.1.0"
description  = "Éditeur de documents collaboratif — rich text, versioning, partage, commentaires."
author       = "Kubuno Contributors"
license      = "AGPL-3.0"
homepage_url = "https://github.com/kubuno/kubuno"
runtime      = "rust"
dependencies = []
settings_path = "/office/settings"

[process]
entrypoint = "kubuno-office"
args       = []

[server]
host = "127.0.0.1"
port = 3105

[routes]
patterns = [
    { method = "*", path = "/*" },
]

[[sidebar_items]]
id               = "office"
label            = "Office"
icon             = "Briefcase"
path             = "/office"
position         = 25
section          = "main"
protected_folder = "Office"

[[sidebar_items]]
id               = "office-recent"
label            = "Récents"
icon             = "Clock"
path             = "/office/recent"
position         = 26
section          = "main"
protected_folder = "Documents"

