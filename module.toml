[module]
id           = "office"
display_name = "Office"
version      = "0.1.2"
description  = "Éditeur de documents collaboratif — rich text, versioning, partage, commentaires."
author       = "Kubuno Contributors"
license      = "AGPL-3.0"
homepage_url = "https://github.com/kubuno/kubuno"
runtime      = "rust"
dependencies = []
settings_path = "/office/settings"

[process]
entrypoint = "kubuno-office"
args       = []

[server]
host = "127.0.0.1"
port = 3105

[routes]
patterns = [
    { method = "*", path = "/*" },
]

